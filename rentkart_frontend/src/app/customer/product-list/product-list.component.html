<div class="container mt-4">
  <h2 class="mb-4">Rentkart Products</h2>

  <div class="row">
    <div class="col-md-3 mb-4" *ngFor="let p of products">
      <div
  class="card h-100 shadow-sm"
  [routerLink]="['/product', p.id]"
  style="cursor: pointer;"
  >

        <img
          *ngIf="p.image1"
          [src]="p.image1"
          class="card-img-top"
          style="height: 180px; object-fit: cover"
        />

        <div class="card-body">
          <h6 class="card-title">{{ p.name }}</h6>
          <p class="mb-1">
            ₹{{ p.price }} / {{ p.subscription_type }}
          </p>
          <small class="text-muted">
            {{ p.category_name }}
          </small>
        </div>

      </div>
    </div>
  </div>
</div>
